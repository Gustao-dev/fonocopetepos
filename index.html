.main{padding:18px}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.stat{font-size:26px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 420px;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.tab{padding:10px 14px;border:1px solid var(--border);background:#fff;border-radius:999px;cursor:pointer;white-space:nowrap}.tab.active{background:var(--orange);border-color:var(--orange);font-weight:700}
.prod{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;min-height:110px}.prod:hover{border-color:var(--orange)}

.row{display:flex;gap:10px;flex-wrap:wrap}.between{display:flex;justify-content:space-between;gap:12px;align-items:center}.small{font-size:12px}
.table-row{display:grid;grid-template-columns:90px 140px 1fr 120px 120px 110px;gap:10px;align-items:center;border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff;margin-bottom:8px}
.list{max-height:480px;overflow:auto}
@media (max-width: 1000px){.app{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}.table-row{grid-template-columns:90px 1fr 110px}.hide-mobile{display:none}}

function promoDrinkOptions(){
  if(!state.pendingPromo) return [];
  if(state.pendingPromo.specialProductId){
    return [state.products.find(x=>x.id===state.pendingPromo.specialProductId)].filter(Boolean);
  }
  if(state.pendingPromo.drinkSize==='1.5'){
    return state.products.filter(x=>x.active && x.type==='simple' && x.category==='Bebidas' && x.drinkSize==='1.5');
  }
  if(state.pendingPromo.drinkSize==='3'){
    return state.products.filter(x=>x.active && x.type==='simple' && x.category==='Bebidas' && x.drinkSize==='3');
  }
  return [];
}
function promoRecipe(promoId, drinkId){
  const promo = state.products.find(x=>x.id===promoId);
  if(!promo) return [];
  const components = [];
  let baseId = promo.baseProductId || '';
  if(!baseId){
    const baseName = String(promo.name||'').split(' + ')[0].trim();
    const baseProduct = state.products.find(x=>x.type==='simple' && x.name===baseName);
    if(baseProduct) baseId = baseProduct.id;
  }
  if(baseId) components.push({productId:baseId, qty:1});
  if(promo.specialProductId) components.push({productId:promo.specialProductId, qty:1});
  else if(drinkId) components.push({productId:drinkId, qty:1});
  const hieloProduct = state.products.find(x=>x.type==='simple' && String(x.name||'').trim().toLowerCase()==='hielo');
  if(hieloProduct) components.push({productId:hieloProduct.id, qty:1});
  return components;
}

function parseDMY(s){
  const [d,m,y]=s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDMY(dt){
  const d=String(dt.getDate()).padStart(2,'0');
  const m=String(dt.getMonth()+1).padStart(2,'0');
  const y=dt.getFullYear();
  return `${d}-${m}-${y}`;
}
function weekDatesFromActive(){
  const active=parseDMY(state.activeDate);
  const day=(active.getDay()+6)%7; // lunes=0
  const monday=new Date(active);
  monday.setDate(active.getDate()-day);
  const arr=[];
  for(let i=0;i<7;i++){ const x=new Date(monday); x.setDate(monday.getDate()+i); arr.push(fmtDMY(x)); }
  return arr;
}
function monthDatesFromActive(){
  const active=parseDMY(state.activeDate);
  const first=new Date(active.getFullYear(), active.getMonth(), 1);
  const arr=[];
  let d=new Date(first);
  while(d.getMonth()===first.getMonth() && d<=active){ arr.push(fmtDMY(d)); d.setDate(d.getDate()+1); }
  return arr;
}
function dashboardOrders(){
  const orders=branchOrders();
  if(state.dashboardPeriod==='dia') return orders.filter(o=>o.date===state.activeDate);
  if(state.dashboardPeriod==='semana'){ const set=new Set(weekDatesFromActive()); return orders.filter(o=>set.has(o.date)); }
  if(state.dashboardPeriod==='mes'){ const set=new Set(monthDatesFromActive()); return orders.filter(o=>set.has(o.date)); }
  if(state.dashboardPeriod==='fecha'){
    return orders.filter(o=>o.date===state.dashboardFrom);
  }
  if(state.dashboardPeriod==='rango'){
    const from = parseDMY(state.dashboardFrom);
    const to = parseDMY(state.dashboardTo);
    return orders.filter(o=>{
      const d = parseDMY(o.date);
      return d >= from && d <= to;
    });
  }
  return orders;
}
function applyStock(components, multiplier){(components||[]).forEach(c=>{let row=inventoryRow(c.productId,workingBranchId()); if(!row){row={branchId:workingBranchId(),productId:c.productId,stock:0,cost:0,min:0}; state.inventory.push(row)} row.stock=Math.max(0,row.stock + multiplier*c.qty)})}
function periodSummary(orders){
  const payments = orders.reduce((a,o)=>{a.ef+=o.payments.efectivo;a.tr+=o.payments.transferencia;a.tb+=o.payments.transbank;return a},{ef:0,tr:0,tb:0});
  const sales = orders.reduce((a,o)=>a+Number(o.total||0),0);
  const cost = orders.reduce((a,o)=>a+orderCost(o),0);
  const profit = orders.reduce((a,o)=>a+orderProfit(o),0);
  return {sales, cost, profit, orders: orders.length, payments};
}
function inventoryValue(branchId){
  return state.inventory.filter(r=>r.branchId===branchId).reduce((a,r)=>a + Number(r.stock||0) * Number(r.cost||0), 0);
}
function turnoDraftKey(){ return `${workingBranchId()}|${state.activeDate}`; }
function currentFuelExpense(){
  const key = turnoDraftKey();
  const raw = state.fuelExpenseDrafts && key in state.fuelExpenseDrafts ? state.fuelExpenseDrafts[key] : state.fuelExpense;
  return Number((raw||'').toString().replace(/\D/g,'') || 0);
}
function currentCashCounted(){
  const key = turnoDraftKey();
  const raw = state.cashCountedDrafts && key in state.cashCountedDrafts ? state.cashCountedDrafts[key] : state.cashCounted;
  return Number((raw||'').toString().replace(/\D/g,'') || 0);
}
function currentShiftFinancials(){
  const todays = branchOrders().filter(o=>o.date===state.activeDate);
  const summary = periodSummary(todays);
  const fuel = currentFuelExpense();
  const expectedCash = summary.payments.ef;
  const countedCash = currentCashCounted();
  const cashDiff = countedCash ? countedCash - expectedCash : 0;
  const realProfit = summary.profit - fuel;
  return {summary, fuel, expectedCash, countedCash, cashDiff, realProfit};
}
function refreshTurnoSummary(){
  const fe = document.getElementById('fuelExpenseInput');
  const cc = document.getElementById('cashCountedInput');
  const key = turnoDraftKey();

  if(fe){
    const val = String(fe.value).replace(/\D/g,'');
    state.fuelExpenseDrafts[key] = val;
    state.fuelExpense = val;
  }
  if(cc){
    const val = String(cc.value).replace(/\D/g,'');
    state.cashCountedDrafts[key] = val;
    state.cashCounted = val;
  }
  const {summary, fuel, expectedCash, countedCash, cashDiff, realProfit} = currentShiftFinancials();
  const fuelEl = document.querySelector('[data-role="fuel-val"]');
  const expEl = document.querySelector('[data-role="expected-cash"]');
  const diffEl = document.querySelector('[data-role="cash-diff"]');
  const profitEl = document.querySelector('[data-role="real-profit"]');
  if(fuelEl) fuelEl.textContent = clp(fuel);
  if(expEl) expEl.textContent = clp(expectedCash);
  if(diffEl){
    diffEl.textContent = clp(cashDiff);
    diffEl.className = cashDiff<0 ? 'red' : (cashDiff>0 ? 'green' : '');
  }
  if(profitEl) profitEl.textContent = clp(realProfit);
}
function closeCurrentShift(){
  const todays = branchOrders().filter(o=>o.date===state.activeDate);
  const summary = periodSummary(todays);
  const existingIndex = state.shiftClosures.findIndex(s=>s.branchId===workingBranchId() && s.date===state.activeDate);
  const payload = {
    id: uid(),
    branchId: workingBranchId(),
    branchName: branch().name,
    date: state.activeDate,
    shiftName: state.shiftName,
    closedBy: state.currentUser.name,
    closedAt: nowTime(),
    sales: summary.sales,
    cost: summary.cost,
    profit: summary.profit,
    fuelExpense: currentFuelExpense(),
    realProfit: summary.profit - currentFuelExpense(),
    expectedCash: summary.payments.ef,
    countedCash: currentCashCounted(),
    cashDifference: currentCashCounted() ? currentCashCounted() - summary.payments.ef : 0,
    orders: summary.orders,
    payments: summary.payments
  };
  if(existingIndex >= 0) state.shiftClosures[existingIndex] = payload;
  else state.shiftClosures.push(payload);
  state.turnOpen = false;
}
function orderCost(order){
  return (order.items||[]).reduce((sum,item)=>{
    const comps = item.components && item.components.length
      ? item.components
      : [{productId:item.productId, qty:1}];
    const itemCost = comps.reduce((acc,c)=>{
      // Usar costo guardado al momento de la venta si existe (evita retroactividad)
      const cost = c.costAtSale !== undefined
        ? Number(c.costAtSale||0)
        : Number((inventoryRow(c.productId, order.branchId)||{cost:0}).cost||0);
      return acc + cost * Number(c.qty||0);
    },0);
    return sum + itemCost * Number(item.qty||1);
  },0);
}
function orderProfit(order){
  return Number(order.total||0) - orderCost(order);
}

function shiftDate(dateStr, delta){
  const [d,m,y] = String(dateStr||state.activeDate||'01-01-2026').split('-').map(Number);
  const dt = new Date(y, (m||1)-1, d||1);
  dt.setDate(dt.getDate()+delta);
  const dd = String(dt.getDate()).padStart(2,'0');
  const mm = String(dt.getMonth()+1).padStart(2,'0');
  const yy = dt.getFullYear();
  return `${dd}-${mm}-${yy}`;
}
function shiftMonthKey(monthKey, delta){
  const parts = String(monthKey||capitalMonthKey()).split('-');
  let m = Number(parts[0]||1);
  let y = Number(parts[1]||2026);
  m += delta;
  while(m<1){ m+=12; y-=1; }
  while(m>12){ m-=12; y+=1; }
  return `${String(m).padStart(2,'0')}-${y}`;
}
function currentFacturasMonthKey(){
  if(!state.facturasMonthKey) state.facturasMonthKey = capitalMonthKey();
  return state.facturasMonthKey;
}
function ownerMonthKey(){
  if(!state.ownerViewMonthKey) state.ownerViewMonthKey = capitalMonthKey();
  return state.ownerViewMonthKey;
}
function monthInvoicesForBranch(branchId, monthKey){
  return state.invoices.filter(x=>{
    if(x.branchId!==branchId) return false;
    const parts = String(x.date||'').split('-');
    if(parts.length!==3) return false;
    return `${parts[1]}-${parts[2]}` === monthKey;
  });
}
function shiftClosuresForBranchMonth(branchId, monthKey){
  return state.shiftClosures.filter(s=>{
    if(s.branchId!==branchId) return false;
    const parts = String(s.date||'').split('-');
    if(parts.length!==3) return false;
    return `${parts[1]}-${parts[2]}` === monthKey;
  });
}
function branchOrdersByDate(branchId, dateStr){
  return state.orders.filter(o=>o.branchId===branchId && o.date===dateStr);

function monthOrdersForBranch(branchId, monthKey){
  return state.orders.filter(o=>{

}

function currentMayorMonthKey(){
  return state.mayorMonthKey || capitalMonthKey();
}
function monthNameFromKey(key){
  const [mm,yyyy] = String(key||'').split('-');
  const names = {'01':'Enero','02':'Febrero','03':'Marzo','04':'Abril','05':'Mayo','06':'Junio','07':'Julio','08':'Agosto','09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre'};
  return `${names[mm]||mm} ${yyyy||''}`.trim();
}
function availableMonthKeys(){
  const set = new Set();
  branchOrders().forEach(o=>{
    const parts = String(o.date||'').split('-');
    if(parts.length===3) set.add(`${parts[1]}-${parts[2]}`);
  });
  if(state.activeDate){
    const parts = String(state.activeDate).split('-');
    if(parts.length===3) set.add(`${parts[1]}-${parts[2]}`);
  }
  return Array.from(set).sort((a,b)=>{
    const [ma,ya]=a.split('-').map(Number);
    const [mb,yb]=b.split('-').map(Number);
    return (yb-ya) || (mb-ma);
  });
}
function groupedDailyRows(monthKey){
  const map = {};
  branchOrders().forEach(o=>{
    const parts = String(o.date||'').split('-');
    if(parts.length!==3) return;
    if(`${parts[1]}-${parts[2]}` !== monthKey) return;
    if(!map[o.date]) map[o.date] = {date:o.date, sales:0, cost:0, gasto:0, ganancia:0, orders:0};
    map[o.date].sales += Number(o.total||0);
    map[o.date].cost += orderCost(o);
    map[o.date].ganancia += orderProfit(o);
    map[o.date].orders += 1;
  });

  state.shiftClosures
    .filter(s=>s.branchId===workingBranchId())
    .forEach(s=>{
      const parts = String(s.date||'').split('-');
      if(parts.length!==3) return;
      if(`${parts[1]}-${parts[2]}` !== monthKey) return;
      if(!map[s.date]) map[s.date] = {date:s.date, sales:0, cost:0, gasto:0, ganancia:0, orders:0};
      map[s.date].gasto = Number(s.fuelExpense||0);
      map[s.date].ganancia = map[s.date].sales - map[s.date].cost - map[s.date].gasto;
    });

  return Object.values(map).sort((a,b)=>{
    const [da,ma,ya]=a.date.split('-').map(Number);
    const [db,mb,yb]=b.date.split('-').map(Number);
    return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
  });
}

function capitalMonthKey(){
  const srcDate = state.activeDate || '01-01-2026';

function monthOrdersForCapital(monthKey){
  return branchOrders().filter(o=>{
    const parts = String(o.date||'').split('-');
    if(parts.length!==3) return false;
    return `${parts[1]}-${parts[2]}` === monthKey;
  });
}

function addInvoiceLine(){

function deleteInvoice(invoiceId){
  if(!canEdit()) return;
  if(!confirm('¿Eliminar esta factura? Se revertirá el stock y costo de los productos.')) return;
  const inv = state.invoices.find(x=>x.id===invoiceId);
  if(!inv) return;
  const bid = inv.branchId || workingBranchId();
  // Revertir stock y recalcular costo promedio hacia atrás
  (inv.items||[]).forEach(item=>{
    let row = state.inventory.find(r=>r.branchId===bid && r.productId===item.productId);
    if(!row) return;
    const stockActual = Number(row.stock||0);
    const costoActual = Number(row.cost||0);
    const cantQuitar  = Number(item.qty||0);
    const costoItem   = Number(item.unitCost||0);
    const stockNuevo  = Math.max(0, stockActual - cantQuitar);
    // Revertir promedio ponderado
    const costoTotal  = stockActual * costoActual - cantQuitar * costoItem;
    row.cost  = stockNuevo > 0 ? Math.max(0, Math.round(costoTotal / stockNuevo)) : 0;
    row.stock = stockNuevo;
  });
  state.audit.push({action:'Factura eliminada', user:state.currentUser.name, branchId:bid, date:nowDateLocal(), time:nowTime(), detail:`Factura "${inv.detail}" del ${inv.date} eliminada`});
  state.invoices = state.invoices.filter(x=>x.id!==invoiceId);
  renderFacturas();
  if(typeof window._fbSaveState==='function') window._fbSaveState();
}

function openEditInvoice(invoiceId){
  if(!canEdit()) return;
  const inv = state.invoices.find(x=>x.id===invoiceId);
  if(!inv) return;
  if(!confirm('¿Editar esta factura? Se revertirá el inventario y podrás modificarla.')) return;
  const bid = inv.branchId || workingBranchId();
  // Revertir stock y costo igual que al eliminar
  (inv.items||[]).forEach(item=>{
    let row = state.inventory.find(r=>r.branchId===bid && r.productId===item.productId);
    if(!row) return;
    const stockActual = Number(row.stock||0);
    const costoActual = Number(row.cost||0);
    const cantQuitar  = Number(item.qty||0);
    const costoItem   = Number(item.unitCost||0);
    const stockNuevo  = Math.max(0, stockActual - cantQuitar);
    const costoTotal  = stockActual * costoActual - cantQuitar * costoItem;
    row.cost  = stockNuevo > 0 ? Math.max(0, Math.round(costoTotal / stockNuevo)) : 0;
    row.stock = stockNuevo;
  });
  // Cargar la factura al carrito de facturas para edición
  state.invoiceCart     = JSON.parse(JSON.stringify(inv.items||[]));
  state.invoiceDetail   = inv.detail || '';
  state.invoiceDateDraft = inv.date || state.activeDate;
  // Eliminar la factura original
  state.invoices = state.invoices.filter(x=>x.id!==invoiceId);
  state.audit.push({action:'Factura en edición', user:state.currentUser.name, branchId:bid, date:nowDateLocal(), time:nowTime(), detail:`Factura "${inv.detail}" cargada para edición`});
  renderFacturas();
  if(typeof window._fbSaveState==='function') window._fbSaveState();
}

function saveProductInvoice(){
  if(!canEdit()) return;
  // Leer siempre desde el DOM primero, luego fallback al state
  const facDetailEl = document.getElementById('facDetail');
  const facDateEl   = document.getElementById('facDate');
  if(facDetailEl) state.invoiceDetail   = facDetailEl.value;
  if(facDateEl)   state.invoiceDateDraft = facDateEl.value;
  const detail = String(state.invoiceDetail || '').trim();
  const date   = String(state.invoiceDateDraft || state.activeDate).trim() || state.activeDate;
  const items  = (state.invoiceCart || []).slice();
  if(!detail) return alert('Debes ingresar el detalle o nombre del proveedor');
  if(!items.length) return alert('Agrega al menos un producto a la factura');
  const totalCost = items.reduce((a,x)=>a+Number(x.totalCost||0),0);

  items.forEach(item=>{
    let row = inventoryRow(item.productId, workingBranchId());
    if(!row){
      row = {branchId:workingBranchId(), productId:item.productId, stock:0, cost:0, min:0};
      state.inventory.push(row);
    }
    const stockActual  = Number(row.stock||0);
    const costoActual  = Number(row.cost||0);
    const cantNueva    = Number(item.qty||0);
    const costoNuevo   = Number(item.unitCost||0);
    const stockTotal   = stockActual + cantNueva;
    // Promedio ponderado: (stock actual × costo actual + cantidad nueva × costo nuevo) / stock total
    row.cost  = stockTotal > 0
      ? Math.round((stockActual * costoActual + cantNueva * costoNuevo) / stockTotal)
      : costoNuevo;
    row.stock = stockTotal;
  });

  state.invoices.unshift({
    id:uid(),
    branchId:workingBranchId(),
    detail,
    totalCost,
    date,
    items,
    createdBy: state.currentUser ? state.currentUser.name : 'Desconocido',
    createdAt: nowTime()
  });

  state.invoiceCart = [];
  state.invoiceDetail = '';
  state.invoiceDateDraft = state.activeDate;
  renderFacturas();
  if(typeof window._fbSaveState==='function') window._fbSaveState();
}

      const drink = state.products.find(x=>x.id===drinkId);

        const promoBase = cartItem.name.split(' + ')[0];

          {productId: drinkId, qty:1},

function parseDMY(dmy){
  const m = String(dmy||'').match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if(!m) return null;
  const d = new Date(Number(m[3]), Number(m[2])-1, Number(m[1]));
  return isNaN(d.getTime()) ? null : d;
}
function formatDMY(date){
  const dd = String(date.getDate()).padStart(2,'0');
  const mm = String(date.getMonth()+1).padStart(2,'0');
  const yyyy = date.getFullYear();
  return `${dd}-${mm}-${yyyy}`;
}

function exportLibroMayorCSV(){
  try{
    const monthKey = currentMayorMonthKey();
    const rows = groupedDailyRows(monthKey);
    if(!rows.length){
      alert('No hay datos en el libro mayor para exportar.');
      return;
    }
    const iva = numManual(state.mayorManualIva);
    const sueldos1 = numManual(state.mayorManualSueldos1);
    const sueldos2 = numManual(state.mayorManualSueldos2);
    const relativos = numManual(state.mayorManualRelativos);
    const otros = numManual(state.mayorManualOtros);

    const totalVentas = rows.reduce((a,x)=>a+x.sales,0);
    const totalCosto = rows.reduce((a,x)=>a+x.cost,0);
    const totalGasto = rows.reduce((a,x)=>a+x.gasto,0);
    const totalGanancia = rows.reduce((a,x)=>a+x.ganancia,0);
    const pedidos = rows.reduce((a,x)=>a + Number(x.orders || 0), 0);
    const ticketProm = pedidos ? Math.round(totalVentas / pedidos) : 0;
    const costoTicket = pedidos ? Math.round(totalCosto / pedidos) : 0;
    const gananciaPedido = pedidos ? Math.round(totalGanancia / pedidos) : 0;
    const descuentos = iva + sueldos1 + sueldos2 + relativos + otros;
    const neto = totalGanancia - descuentos;

    let csv = "Sucursal,Mes,Fecha,Venta,Costo,Gasto,Ganancia,Pedidos\n";
    rows.forEach(r=>{
      csv += `"${branch().name}","${monthKey}","${r.date}",${r.sales},${r.cost},${r.gasto},${r.ganancia},${r.orders}\n`;
    });

    csv += "\nResumen,Monto\n";
    csv += `"Ventas totales",${totalVentas}\n`;
    csv += `"Costo total",${totalCosto}\n`;
    csv += `"Gasto total",${totalGasto}\n`;
    csv += `"Ganancia total",${totalGanancia}\n`;
    csv += `"Cantidad de repartos",${pedidos}\n`;
    csv += `"Valor ticket promedio",${ticketProm}\n`;
    csv += `"Costo ticket promedio",${costoTicket}\n`;
    csv += `"Ganancia promedio por pedido",${gananciaPedido}\n`;
    csv += `"IVA",${iva}\n`;
    csv += `"Sueldos 1",${sueldos1}\n`;
    csv += `"Sueldos 2",${sueldos2}\n`;
    csv += `"Gastos relativos",${relativos}\n`;
    csv += `"Otros gastos",${otros}\n`;
    csv += `"Total descuentos",${descuentos}\n`;
    csv += `"Ganancia neta mensual",${neto}\n`;

    const blob = new Blob(["\ufeff" + csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const safeBranch = branch().name.replace(/\s+/g,'_');
    a.download = `libro_mayor_${safeBranch}_${monthKey}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){
    console.error(e);
    alert('No se pudo exportar el libro mayor.');
  }
}

    state.selectedCourierId = '';
    state.mixEf = 0;
    state.mixTr = 0;
    state.mixTb = 0;
    state.fuelExpense = '';
    state.cashCounted = '';
    state.monthlyExpenses = {};
    state.capitalIncreases = {};
    state.mayorManualIva = '';
    state.mayorManualSueldos1 = '';
    state.mayorManualSueldos2 = '';
    state.mayorManualRelativos = '';

    (state.inventory || []).forEach(r => {

<script type="module">
// ============================================================
//  FIREBASE CONFIG
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAaVnmtkVUXovDlRaRA3xOHn2hV-KwPcoI",
  authDomain: "fonoprueba1-9614b.firebaseapp.com",
  projectId: "fonoprueba1-9614b",
  storageBucket: "fonoprueba1-9614b.firebasestorage.app",
  messagingSenderId: "694367577729",
  appId: "1:694367577729:web:4d72a990d4dc9dd7c04f80"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ============================================================
//  Documento Firestore según usuario activo
//  - Sucursales operativas: pos/conce  pos/la  pos/chi
//  - Dueño: pos/dueno  (solo se actualiza al cerrar turno)
// ============================================================
function getDocKey(){
  const user = state.currentUser;
  if(!user) return null;
  if(user.role === 'dueno') return 'dueno';
  return user.branchId || 'conce';
}

// ============================================================
//  Indicador visual de sincronización
// ============================================================
function setSyncStatus(msg, color){
  let el = document.getElementById('_syncStatus');
  if(!el){
    el = document.createElement('div');
    el.id = '_syncStatus';
    el.style.cssText = 'position:fixed;bottom:12px;right:12px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;z-index:9999;transition:opacity 0.5s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = color;
  el.style.color = '#fff';
  el.style.opacity = '1';
  if(color === '#16a34a'){
    setTimeout(()=>{ el.style.opacity = '0'; }, 2500);
  }
}

// ============================================================
//  GUARDAR estado de la sucursal activa
// ============================================================
let _saveTimer = null;
async function savePersistentState(){
  const key = getDocKey();
  if(!key) return; // no hay sesión activa, no guardar

  // El dueño NO guarda con cada acción — solo al cerrar turno
  if(key === 'dueno') return;

  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    try{
      setSyncStatus('Guardando…', '#f97316');
      const clean = JSON.parse(JSON.stringify(state));
      await setDoc(doc(db, 'pos', key), clean);
      setSyncStatus('✓ Guardado', '#16a34a');
    }catch(e){
      setSyncStatus('⚠ Error al guardar', '#dc2626');
      console.error('Firebase save error:', e);
    }
  }, 600);
}

// ============================================================
//  GUARDAR resumen del dueño al cerrar turno
//  Lee los datos de las 3 sucursales y los consolida
// ============================================================
async function syncDuenoOnShiftClose(){
  try{
    setSyncStatus('Sincronizando con dueño…', '#6b7280');

    // Leer los 3 documentos de sucursales en paralelo
    const [snapConce, snapLa, snapChi] = await Promise.all([
      getDoc(doc(db, 'pos', 'conce')),
      getDoc(doc(db, 'pos', 'la')),
      getDoc(doc(db, 'pos', 'chi'))
    ]);

    // Consolidar orders, shiftClosures e invoices de todas las sucursales
    const allOrders = [];
    const allClosures = [];
    const allInvoices = [];

    for(const snap of [snapConce, snapLa, snapChi]){
      if(!snap.exists()) continue;
      const d = snap.data();
      if(Array.isArray(d.orders))        allOrders.push(...d.orders);
      if(Array.isArray(d.shiftClosures)) allClosures.push(...d.shiftClosures);
      if(Array.isArray(d.invoices))      allInvoices.push(...d.invoices);
    }

    // Leer el estado actual del dueño para no pisarle sus propios datos
    const duenoSnap = await getDoc(doc(db, 'pos', 'dueno'));
    const duenoBase = duenoSnap.exists() ? duenoSnap.data() : {};

    const duenoPayload = {
      ...duenoBase,
      orders:        allOrders,
      shiftClosures: allClosures,
      invoices:      allInvoices,
      _lastSync:     new Date().toISOString()
    };

    await setDoc(doc(db, 'pos', 'dueno'), duenoPayload);
    setSyncStatus('✓ Dueño actualizado', '#16a34a');
  }catch(e){
    setSyncStatus('⚠ Error al sincronizar dueño', '#dc2626');
    console.error('syncDueno error:', e);
  }
}

// ============================================================
//  CARGAR estado según la sucursal del usuario que inicia sesión
// ============================================================
async function loadPersistentState(){
  const key = getDocKey();
  if(!key) return;

  try{
    setSyncStatus('Cargando datos…', '#6b7280');
    const snap = await getDoc(doc(db, 'pos', key));
    if(!snap.exists()){
      setSyncStatus('Primera vez en esta sucursal', '#6b7280');
      return;
    }
    const saved = snap.data();
    if(!saved || typeof saved !== 'object') return;

    const preserved = {
      users:      Array.isArray(saved.users)      && saved.users.length      ? saved.users      : state.users,
      branches:   Array.isArray(saved.branches)   && saved.branches.length   ? saved.branches   : state.branches,
      categories: Array.isArray(saved.categories) && saved.categories.length ? saved.categories : state.categories,
      couriers:   Array.isArray(saved.couriers)   && saved.couriers.length   ? saved.couriers   : state.couriers,
      products:   Array.isArray(saved.products)   && saved.products.length   ? saved.products   : state.products
    };

    // Preservar el usuario que acaba de hacer login — no pisarlo con el guardado
    const activeUser = state.currentUser;

    Object.assign(state, saved);

    state.currentUser = activeUser;
    state.users      = preserved.users;
    state.branches   = preserved.branches;
    state.categories = preserved.categories;
    state.couriers   = preserved.couriers;
    state.products   = preserved.products;

    if(!Array.isArray(state.inventory))     state.inventory = [];
    if(!Array.isArray(state.orders))        state.orders = [];
    if(!Array.isArray(state.invoices))      state.invoices = [];
    if(!Array.isArray(state.shiftClosures)) state.shiftClosures = [];
    if(!Array.isArray(state.audit))         state.audit = [];
    if(!Array.isArray(state.cart))          state.cart = [];
    if(!Array.isArray(state.invoiceCart))   state.invoiceCart = [];
    if(!state.capitalIncreases  || typeof state.capitalIncreases  !== 'object') state.capitalIncreases = {};
    if(!state.monthlyExpenses   || typeof state.monthlyExpenses   !== 'object') state.monthlyExpenses = {};
    if(!state.fuelExpenseDrafts || typeof state.fuelExpenseDrafts !== 'object') state.fuelExpenseDrafts = {};
    if(!state.cashCountedDrafts || typeof state.cashCountedDrafts !== 'object') state.cashCountedDrafts = {};

    setSyncStatus('✓ Datos cargados', '#16a34a');
  }catch(e){
    setSyncStatus('⚠ Error al cargar', '#dc2626');
    console.error('Firebase load error:', e);
  }
}

// ============================================================
//  Exponer funciones al scope global para que login() las use
// ============================================================
window._fbLoadState = loadPersistentState;
window._fbSaveState = savePersistentState;
window._fbSyncDueno = syncDuenoOnShiftClose;

// ============================================================
//  Parchear login para cargar datos de la sucursal correcta
// ============================================================
window.login = async function(){
  // Validar credenciales antes de hacer nada
  const userId = document.getElementById('loginUser').value;
  const pass   = document.getElementById('loginPass').value;
  const user   = state.users.find(u => String(u.id) === String(userId));
  if(!user){ alert('Selecciona un usuario'); return; }
  let defaultPass = user.role === 'dueno' ? '2812' : user.role === 'encargado' ? '1234' : '1111';
  if(String(pass).trim() !== String(user.password || defaultPass)){ alert('Clave incorrecta'); return; }

  // Ocultar login y mostrar app inmediatamente
  const loginRoot = document.getElementById('loginRoot');
  const appRoot   = document.getElementById('appRoot');
  if(loginRoot){ loginRoot.style.display = 'none'; loginRoot.classList.add('hidden'); }
  if(appRoot){   appRoot.style.display = '';       appRoot.classList.remove('hidden'); }

  // Setear usuario y datos de sesion
  state.currentUser = user;
  state.selectedHistoryDate = state.activeDate;
  state.selectedCourierDate = state.activeDate;
  if(typeof syncHistoryDateToBranch === 'function') syncHistoryDateToBranch();
  if(typeof syncCourierDateToBranch === 'function') syncCourierDateToBranch();
  if(typeof syncCourierSelectionToBranch === 'function') syncCourierSelectionToBranch();
  const k = typeof turnoDraftKey === 'function' ? turnoDraftKey() : '';
  state.fuelExpense  = (state.fuelExpenseDrafts  && k) ? (state.fuelExpenseDrafts[k]  || '') : '';
  state.cashCounted  = (state.cashCountedDrafts   && k) ? (state.cashCountedDrafts[k]   || '') : '';

  // Cargar datos de Firebase para esta sucursal
  // IMPORTANTE: guardamos el usuario actual ANTES de cargar Firebase
  // porque Firebase puede traer un currentUser anterior guardado en el state
  setSyncStatus('Cargando sesion...', '#6b7280');
  const loggedInUser = user; // referencia al usuario que acaba de autenticarse
  await loadPersistentState();

  // Restaurar el usuario que inició sesión ahora (no el que traía Firebase)
  state.currentUser = loggedInUser;
  state.view = state.view || 'dashboard';

  // Recalcular datos de sesión con el usuario correcto
  if(typeof syncHistoryDateToBranch === 'function') syncHistoryDateToBranch();
  if(typeof syncCourierDateToBranch === 'function') syncCourierDateToBranch();
  if(typeof syncCourierSelectionToBranch === 'function') syncCourierSelectionToBranch();

  // Renderizar con datos ya cargados y usuario correcto
  try{ if(typeof render === 'function') render(); }catch(e){ console.error(e); }
};

// Parchear logout para limpiar correctamente la UI
const _originalLogout = window.logout;
window.logout = function(){
  state.currentUser = null;
  state.view = 'login';
  const appRoot   = document.getElementById('appRoot');
  const loginRoot = document.getElementById('loginRoot');
  if(appRoot){   appRoot.style.display = 'none';  appRoot.classList.add('hidden'); }
  if(loginRoot){ loginRoot.style.display = '';    loginRoot.classList.remove('hidden'); }
  const pass = document.getElementById('loginPass');
  if(pass) pass.value = '';
  if(typeof initLogin === 'function') initLogin();
};

// ============================================================
//  Parchear closeCurrentShift para sincronizar al dueño
// ============================================================
const _originalCloseShift = window.closeCurrentShift;
window.closeCurrentShift = async function(){
  _originalCloseShift.apply(this, arguments);
  await savePersistentState();          // guarda la sucursal primero
  await syncDuenoOnShiftClose();        // luego consolida en dueno
};

// ============================================================
//  Envolver funciones clave para guardar automáticamente
// ============================================================
function wrapFunction(name){
  // No re-envolver closeCurrentShift (ya lo parcheamos arriba)
  if(name === 'closeCurrentShift') return;
  const original = window[name];
  if(typeof original !== 'function') return;
  if(original.__wrapped_persist__) return;
  const wrapped = function(){
    const result = original.apply(this, arguments);
    savePersistentState();
    return result;
  };
  wrapped.__wrapped_persist__ = true;
  window[name] = wrapped;
}

// ============================================================
//  Inicio — solo carga si ya había sesión guardada en el state
// ============================================================
window.addEventListener('load', async function(){
  // Si había una sesión persistida localmente, cargamos desde Firebase
  if(state.currentUser){
    await loadPersistentState();
    try{ if(typeof render === 'function') render(); }catch(e){}
  }

  [
    'render','saveOrder','deleteSale','openNewDay',
    'saveProductInvoice','adjustInventory','addProductManual','addCategory',
    'addUserManual','addCourierManual','toggleCourier','updateSalePrice',
    'updateCost','logout'
  ].forEach(wrapFunction);
});

window.addEventListener('beforeunload', function(){
  savePersistentState();
});
</script>
